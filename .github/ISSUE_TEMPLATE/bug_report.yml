name: Bug report
description: Report a platform bug or regression.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. Please include enough detail for a failing test
        to be written before the fix lands.
  - type: input
    id: summary
    attributes:
      label: Summary
      description: One-sentence description of the issue.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide a deterministic reproduction sequence.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: test-gap
    attributes:
      label: Missing test coverage
      description: Which unit, integration, or end-to-end test should catch this?
