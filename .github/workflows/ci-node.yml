name: ci-node

on:
  pull_request:
    paths:
      - "apps/**"
      - "packages/**"
      - "services/**"
      - "games/**"
      - ".github/workflows/ci-node.yml"
      - ".github/workflows/ci-games.yml"
      - ".github/workflows/ci-playwright.yml"
      - ".github/workflows/ci-ios.yml"
      - "Makefile"
      - "package.json"
      - "pnpm-workspace.yaml"
  push:
    branches:
      - main
    paths:
      - "apps/**"
      - "packages/**"
      - "services/**"
      - "games/**"
      - ".github/workflows/ci-node.yml"
      - ".github/workflows/ci-games.yml"
      - ".github/workflows/ci-playwright.yml"
      - ".github/workflows/ci-ios.yml"
      - "Makefile"
      - "package.json"
      - "pnpm-workspace.yaml"

permissions:
  contents: read

concurrency:
  group: ci-node-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit and integration tests
        run: |
          pnpm test
          pnpm test:integration

      - name: Build
        run: pnpm build
